name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.26.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - run: make build
      - name: Smoke test
        run: ./bbx version

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      # We bypass golangci/golangci-lint-action because its "latest" alias
      # currently pins to v1.64.8, which (a) rejects our v2 .golangci.yml
      # schema and (b) was built with Go 1.24 and refuses to analyse code
      # with `go 1.26` in go.mod. `go install` of the v2 module is
      # reproducible and uses the same Go toolchain as the rest of CI.
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Lint
        run: golangci-lint run --timeout=5m
