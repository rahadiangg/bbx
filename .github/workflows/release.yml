name: Release

# Triggered when a tag matching `v*` is pushed. Tagging a commit is the
# only thing needed to ship a release — goreleaser handles building all
# OS/arch combos, packaging, checksums, and the GitHub release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # goreleaser needs full history + tags to generate the changelog.
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish the npm wrapper (@rahadiangg/bbx-skills) so `npx @rahadiangg/bbx-skills`
  # installs the same skills. Runs after goreleaser; the publish step is skipped
  # when the NPM_TOKEN secret is not configured.
  npm:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"
      - name: Sync skills into the npm package
        run: make sync-npm
      - name: Set version from tag
        # Strip the leading "v" from the git tag (v1.2.3 -> 1.2.3).
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
        working-directory: npm
      - name: Run wrapper tests
        run: node --test
        working-directory: npm
      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm publish --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
