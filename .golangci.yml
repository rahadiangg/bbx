version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - io.Copy(io.Discard,...)
        - fmt.Fprintf
        - fmt.Fprintln
        - (*github.com/jedib0t/go-pretty/v6/table.Table).Render
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - internal/apispec/testdata
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - internal/apispec/testdata
      - third_party$
      - builtin$
      - examples$
